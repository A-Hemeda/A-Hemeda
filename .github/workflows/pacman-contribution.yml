name: Generate pacman contribution graph

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate pacman-contribution-graph.svg
        uses: Platane/snk@v3
        with:
          github_user_name: "A-Hemeda"
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#25E045&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39&dark_color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&color_background=#0d1117

      - name: Publish pacman graph to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
